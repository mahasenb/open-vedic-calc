name: Build and publish image

on:
  push:
    branches: [main]
    # Docs-only changes don't change the image — skip the build.
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  release:
    types: [published]

# Cancel a superseded run when a new commit lands on the same PR/branch, so the
# test job doesn't run to completion on every intermediate push.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      # Tests run with the Moshier fallback (no Swiss ephemeris data files in CI);
      # line coverage is identical to a Swiss run — only numeric values differ.
      # --cov enforces fail_under=90 from pyproject [tool.coverage.report].
      - run: pytest tests/ --cov --cov-report=term-missing
      # ci/tests/ lives outside the tests/ tree by design (it tests the CI
      # gate script itself, not the calc engine) — pytest tests/ never
      # collects it. Without this step, a future edit that weakens
      # _FORBIDDEN in ci/check_no_proprietary_refs.py would pass CI green
      # right up through the image build/publish path.
      - run: pytest ci/tests/ -q

  publish:
    needs: test
    # Never publish from a pull request — main pushes and releases only.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Boot BuildKit from Google's Docker Hub pull-through mirror, and route
          # every docker.io pull (incl. the python:3.10-slim base) through it.
          # Anonymous registry-1.docker.io pulls on GitHub-hosted runners
          # intermittently time out / rate-limit — run #11 failed booting
          # moby/buildkit ("Get https://registry-1.docker.io/v2/: context
          # deadline exceeded"). mirror.gcr.io is reliable and needs no auth.
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Embed the exact source commit so /source returns the authoritative
          # cache key in production (the image is built without a .git dir, so
          # the in-container git rev-parse fallback can never fire).
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
